{% extends 'base.html' %}

{% block content %}
  <h2>Добавить в библиотеку</h2>
  <p>Вы уверены, что хотите добавить игру "{{ game.title }}" в свою библиотеку?</p>
  <form method="post">
    {% csrf_token %}
    <button class="submit-button" type="submit">Да, добавить</button>
    <a href="{% url 'game_detail' game.id %}">Нет, отмена</a>
  </form>
{% endblock %}
