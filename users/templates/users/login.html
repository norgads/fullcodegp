{% extends 'base.html' %}

{% block content %}
    <div class="login-container">
        <h2>Вход</h2>
        <form method="POST" class="login-form">
            {% csrf_token %}
            <div class="form-group">
                {{ form.username.label_tag }}
                {{ form.username }}
            </div>
            <div class="form-group">
                {{ form.password.label_tag }}
                {{ form.password }}
            </div>
            <button class="submit-button" type="submit">Войти</button>
        </form>
    </div>
{% endblock %}
